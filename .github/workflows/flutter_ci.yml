name: Flutter CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
      - refactor/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    name: Format, Analyze, Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fitness_tracker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # dart_defines.json is gitignored (contains secrets).
      # For CI we create it from repository secrets so `flutter run`/`flutter build`
      # commands work. `flutter test` does not need this file, but having it
      # present avoids surprises if test helpers ever call EnvConfig.
      - name: Create dart_defines.json from secrets
        env:
          PICOVOICE_ACCESS_KEY: ${{ secrets.PICOVOICE_ACCESS_KEY }}
        run: |
          cat > dart_defines.json <<EOF
          {
            "APP_ENV": "development",
            "ENABLE_SUPABASE": "true",
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "PICOVOICE_ACCESS_KEY": "${{ secrets.PICOVOICE_ACCESS_KEY }}"
          }
          EOF

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze project
        # --no-fatal-infos: only warnings and errors fail CI.
        # Info-level lints are advisory (see KNOWN_ISSUES.md#flutter-analyze-info-issues-do-not-fail-ci).
        run: flutter analyze --no-fatal-infos

      - name: Check conventions
        run: dart run tool/check_conventions.dart

      - name: Check state freshness
        run: dart run tool/check_state_freshness.dart

      - name: Run tests
        run: flutter test

  backend:
    name: Backend (Deno)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness_tracker/supabase/functions
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Run tests
        run: deno test --allow-all
