name: Flutter CI

on:
  push:
    # Keep in sync with the documented branch-naming convention in
    # CLAUDE.md (chore/, ci/, docs/, feat/, fix/, perf/, refactor/).
    # `feature/**` is retained for backward compatibility with older branches.
    branches:
      - main
      - develop
      - chore/**
      - ci/**
      - docs/**
      - feat/**
      - feature/**
      - fix/**
      - perf/**
      - refactor/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    name: Format, Analyze, Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fitness_tracker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart_defines.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # In the upstream repo these secrets are always set.
          # In a fork they may be absent — GitHub expands an unset secret to an
          # empty string. An empty string written to dart_defines.json would
          # override the production defaults in env_config.dart with empty
          # strings, breaking the APK build. We write secret overrides only
          # when they are actually set; otherwise we write a minimal file and
          # let the code fall through to the production defaults baked into
          # env_config.dart. ENVIRONMENT must be one of development/staging/
          # production (validated by EnvConfig.ensureValidRuntimeConfig at
          # bootstrap), so we use "development" rather than "ci".
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            cat > dart_defines.json <<EOF
          {
            "ENVIRONMENT": "development",
            "ENABLE_SUPABASE": "true",
            "SUPABASE_URL": "$SUPABASE_URL",
            "SUPABASE_ANON_KEY": "$SUPABASE_ANON_KEY"
          }
          EOF
          else
            printf '{"ENVIRONMENT":"development"}\n' > dart_defines.json
          fi

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze project
        # --no-fatal-infos: only warnings and errors fail CI.
        # Info-level lints are advisory (see KNOWN_ISSUES.md#flutter-analyze-info-issues-do-not-fail-ci).
        run: flutter analyze --no-fatal-infos

      - name: Check conventions
        run: dart run tool/check_conventions.dart

      - name: Check state freshness
        run: dart run tool/check_state_freshness.dart

      - name: Run tests with coverage
        # --coverage writes coverage/lcov.info, consumed by the next step.
        # The instrumented run is meaningfully slower than a bare
        # `flutter test`; if CI minutes become a concern, split this into
        # a separate parallel job.
        # --dart-define=ENABLE_SUPABASE=false keeps unit tests self-contained
        # and prevents them from reaching the live backend even though the
        # production defaults baked into env_config.dart enable it by default.
        run: flutter test --coverage --dart-define=ENABLE_SUPABASE=false

      - name: Check coverage thresholds
        # Per-directory minimums declared in tool/check_coverage.dart.
        # Only ratchet thresholds upward — never lower them to make CI
        # green; add tests instead.
        run: dart run tool/check_coverage.dart

      - name: Build debug APK
        # Compiles the Android binary end-to-end. Analyzer + unit tests
        # cover almost everything but cannot catch manifest, Gradle,
        # Kotlin-side, or plugin-registration regressions — those only
        # surface at build time. Debug build (not release) because release
        # needs a CI signing setup the repo does not yet ship.
        #
        # Uses --dart-define-from-file=dart_defines.json so the build
        # exercises the Supabase-enabled production code path that real
        # users run, not the defaults-only no-Supabase fallback.
        run: flutter build apk --debug --dart-define-from-file=dart_defines.json

  backend:
    name: Backend (Deno)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness_tracker/supabase/functions
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type-check
        # `deno test` already type-checks the files transitively reachable
        # from test files. This explicit pass catches type errors in
        # orphan/unimported .ts files and fails faster than waiting for
        # the test runner to load them.
        run: deno check $(find . -name '*.ts' -not -path '*/node_modules/*')

      - name: Run tests
        run: deno test --allow-all
