name: Supabase Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        type: choice
        options: [functions, migrations, both]
        default: both

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness_tracker
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push migrations
        if: ${{ inputs.target != 'functions' }}
        run: supabase db push

      - name: Deploy functions
        if: ${{ inputs.target != 'migrations' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          deployed=0
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            # Skip shared modules and any hidden directories.
            if [[ "$name" == "_shared" || "$name" == .* ]]; then
              continue
            fi
            # Require an index.ts to call this directory a function.
            if [[ ! -f "$dir/index.ts" ]]; then
              echo "::warning::Skipping $name — no index.ts found"
              continue
            fi
            echo "::group::Deploying $name"
            supabase functions deploy "$name"
            echo "::endgroup::"
            deployed=$((deployed + 1))
          done
          if [[ "$deployed" -eq 0 ]]; then
            echo "::error::No edge functions deployed — directory layout unexpected"
            exit 1
          fi
          echo "Deployed $deployed function(s)."
