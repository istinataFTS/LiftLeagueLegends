name: fitness_tracker
description: A personal fitness tracking app to monitor weekly muscle group training goals.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Remote backend
  supabase_flutter: ^2.8.3

  # Functional Programming
  dartz: ^0.10.1

  # Date/Time Utilities
  intl: ^0.20.2

  # Dependency Injection
  get_it: ^7.6.4

  # UI Components
  cupertino_icons: ^1.0.6
  device_preview: ^1.1.0

  # HTTP client (multipart STT uploads, binary TTS downloads)
  http: ^1.2.0

  # Utils
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4

  # Voice bot — device-native STT (Android SpeechRecognizer / iOS SFSpeechRecognizer)
  speech_to_text: ^7.0.0

  # Voice bot — device-native TTS (Android TextToSpeech / iOS AVSpeechSynthesizer)
  flutter_tts: ^4.2.2

  # Voice bot — runtime permissions (microphone, speech recognition)
  permission_handler: ^11.3.1

  # Required for SherpaOnnxVoiceWakeWordService to extract KWS assets to a
  # filesystem path (sherpa-onnx requires file paths, not asset bundle paths).
  path_provider: ^2.1.0

  # Voice bot — audio capture
  record: ^6.0.0

  # Voice bot — wake-word audio preview in Voice Settings (future use)
  just_audio: ^0.9.40

  # Voice bot — screen-on during Workout Mode
  wakelock_plus: ^1.2.10
  sherpa_onnx: ^1.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  bloc_test: ^9.1.7
  fake_async: ^1.3.1
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.3

  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.8.0

  # Hashing — used by tool/check_state_freshness.dart
  crypto: ^3.0.0

  # Linting
  flutter_lints: ^3.0.0

  # App icon generation for Android + iOS from a single source PNG.
  # Run `dart run flutter_launcher_icons` to regenerate after updating
  # assets/branding/app_icon.png.
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  # iOS is disabled until the iOS portion of the project is scaffolded via
  # `flutter create --platforms=ios .`. Once that runs and
  # `ios/Runner/Assets.xcassets/AppIcon.appiconset/` exists, flip to
  # `ios: true` and re-run `dart run flutter_launcher_icons`. The Info.plist
  # CFBundleDisplayName / CFBundleName already say "Lift League Legends".
  ios: false
  image_path: "assets/branding/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/branding/
    - assets/images/
    - assets/images/body/
    # Wake-word model (sherpa-onnx KWS, offline, no access key).
    # int8 zipformer-gigaspeech model + BPE tokens + tokenized keywords.
    - assets/wake_words/kws/
    # Short audio cues played by JustAudioVoiceEarconService.
    - assets/audio/